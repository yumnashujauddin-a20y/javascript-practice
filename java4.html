<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loops</title>
</head>
<body>
    <p>nothing is important</p>
    <script>
        let i = 0;
        for(i=0;i<3;i++){
            console.log(i);
        }
        let friends = ["yousra","Warda","Arisha"];
        for (let index = 0; index< friends.length;index++){
            console.log("Hello friend,"+ friends[index]);
        }
        friends.forEach(function f(element){
            console.log("Hello friend,"+ element + " to modern javascript again"); 
        })
        let employee = {
            name:"Yumna",
            salary:2,
            channel:"CHW"
        }
        for(key in employee){
            console.log(`The ${key} of employee is ${employee[key]}`);
        }
        let x = 0;
        while(x<4){
            console.log(`${x} is less than 4`);
            x++;
        }
        let j = 34;
        do{
            console.log(`${j} is less than 4 and we are inside do while loop`);
            j++;
        }while(j<4);
    </script>
</body>
</html>
